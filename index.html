    a {
      display: inline-block;
      padding: 12px 28px;
      background: #d4b36c;
      color: #0d0c0a;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.6px;
